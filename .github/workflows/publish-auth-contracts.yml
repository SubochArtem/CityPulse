name: Publish Auth Contracts

on:
  push:
    tags:
      - 'auth-v*'

permissions:
  packages: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Pack Package
        run: dotnet pack src/Backend/Services/Shared/CityPulse.Contracts.Auth/CityPulse.Contracts.Auth.csproj -c Release

      - name: Push to GitHub Packages
        env:
          NUGET_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: dotnet nuget push "src/Backend/Services/Shared/CityPulse.Contracts.Auth/bin/Release/*.nupkg" --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" --api-key $NUGET_AUTH_TOKEN
