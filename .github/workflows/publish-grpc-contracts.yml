name: Publish Contracts

on:
  push:
    tags:
      - 'contracts-v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Pack Package

      - name: Push to GitHub Packages
        run: dotnet nuget push "src/Backend/Services/Shared/CityPulse.Contracts/bin/Release/*.nupkg" --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" --api-key ${{ secrets.GITHUB_TOKEN }}
